trigger:
- main

variables:
  azureServiceConnectionId: '69be4ae1-d766-4f71-9738-fec5b19e0dd4'
  webAppName: 'ECommerec-Web-App-Semantic-Search'
  vmImageName: 'ubuntu-latest'
  environmentName: 'ECommerec-Web-App-Semantic-Search'
  projectRoot: $(System.DefaultWorkingDirectory)
  pythonVersion: '3.11'

stages:

- stage: Build
  displayName: Build Stage
  jobs:
  - job: BuildJob
    pool:
      name: selfhosted-pool   #  Self-hosted pool

    steps:
    - script: |
        echo Python Version
        python --version
      displayName: Check Python

    - script: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
      displayName: Install Dependencies

    - task: ArchiveFiles@2
      inputs:
        rootFolderOrFile: '.'
        includeRootFolder: false
        archiveType: zip
        archiveFile: $(Build.ArtifactStagingDirectory)/app.zip
        replaceExistingArchive: true
      displayName: Archive Files

    - publish: $(Build.ArtifactStagingDirectory)/app.zip
      artifact: drop

- stage: Deploy
  displayName: Deploy Stage
  dependsOn: Build
  condition: succeeded()

  jobs:
  - deployment: DeploymentJob
    pool:
      name: selfhosted-pool   #  Self-hosted pool again

    environment: E-commSemanticSearch

    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebApp@1
            inputs:
              azureSubscription: $(azureServiceConnectionId)
              appType: webAppLinux
              appName: $(webAppName)
              package: $(Pipeline.Workspace)/drop/app.zip
