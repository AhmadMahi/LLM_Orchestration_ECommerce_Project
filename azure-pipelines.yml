trigger:
  - main

variables:
  azureServiceConnectionId: "1d19d476-5493-4441-8e9f-a4690c33a55b"
  webAppName: "docmind"
  pythonVersion: "3.11"

stages:
- stage: Build
  displayName: "Build Stage"
  jobs:
  - job: BuildJob
    pool:
      name: selfhosted-pool   # Self-hosted pool
    steps:
    - script: |
        echo Python Version
        python --version
      displayName: "Check Python"

    - script: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
      displayName: "Install Dependencies"

    - task: ArchiveFiles@2
      displayName: "Archive Files"
      inputs:
        rootFolderOrFile: "."
        includeRootFolder: false
        archiveType: zip
        archiveFile: "$(Build.ArtifactStagingDirectory)/app.zip"
        replaceExistingArchive: true

    - publish: "$(Build.ArtifactStagingDirectory)/app.zip"
      artifact: drop

- stage: Deploy
  displayName: "Deploy Stage"
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: DeploymentJob
    pool:
      name: selfhosted-pool   # Self-hosted pool again
    environment: docmind
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebApp@1
            displayName: "Deploy to Azure Web App"
            inputs:
              azureSubscription: "$(azureServiceConnectionId)"
              appType: webAppLinux
              appName: "$(webAppName)"
              package: "$(Pipeline.Workspace)/drop/app.zip"